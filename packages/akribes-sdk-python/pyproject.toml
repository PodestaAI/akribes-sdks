[project]
name = "akribes"
version = "0.24.0"
description = "Pythonic async client for the Akribes workflow server"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Podesta", email = "info@podesta.ai"}]
requires-python = ">=3.10"
keywords = ["akribes", "llm", "ai-workflows", "agent", "dsl", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "httpx-sse>=0.4.0",
    "pydantic>=2.6",
    "typing-extensions>=4.10",
    "websockets>=12.0",
]

[project.urls]
Homepage = "https://akribes.ai"
Repository = "https://github.com/PodestaAI/akribes-sdks"
Documentation = "https://akribes.ai/sdks/python/"
Issues = "https://github.com/PodestaAI/akribes-sdks/issues"
Changelog = "https://github.com/PodestaAI/akribes-sdks/blob/main/packages/akribes-sdk-python/CHANGELOG.md"

[project.optional-dependencies]
otel = [
    "opentelemetry-api >= 1.20",
]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "respx>=0.21.0",
    "opentelemetry-api >= 1.20",
    "opentelemetry-sdk >= 1.20",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-data]
akribes_sdk = ["py.typed"]

[tool.pytest.ini_options]
asyncio_mode = "strict"

[dependency-groups]
dev = [
    "pytest-timeout>=2.4.0",
]
